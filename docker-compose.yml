services:
  client:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    environment:
      - NODE_ENV=development
      - PYTHON_API_URL=http://server:8000
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./py:/app/py
    environment:
      - DATABASE_URL=postgresql+asyncpg://urbanus:urbanus@postgres:5432/urbanus
      - OPENTOPOGRAPHY_API_KEY=${OPENTOPOGRAPHY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: urbanus
      POSTGRES_PASSWORD: urbanus
      POSTGRES_DB: urbanus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
