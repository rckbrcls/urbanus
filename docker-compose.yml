services:
  client:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/app:/app/apps/web/app
      - ./apps/web/components:/app/apps/web/components
      - ./apps/web/features:/app/apps/web/features
      - ./apps/web/hooks:/app/apps/web/hooks
      - ./apps/web/i18n:/app/apps/web/i18n
      - ./apps/web/lib:/app/apps/web/lib
      - ./apps/web/stores:/app/apps/web/stores
      - ./packages/geo/src:/app/packages/geo/src
      - ./packages/constants/src:/app/packages/constants/src
      - ./packages/utils/src:/app/packages/utils/src
    environment:
      - NODE_ENV=development
      - PYTHON_API_URL=http://server:8000
      - OVERPASS_API_URLS=${OVERPASS_API_URLS:-https://overpass-api.de/api/interpreter,https://overpass.kumi.systems/api/interpreter}
      - OVERPASS_USER_AGENT=${OVERPASS_USER_AGENT:-Urbanus/0.1 (+https://github.com/rckbrcls/urbanus)}
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./py:/app/py
    environment:
      - DATABASE_URL=postgresql+asyncpg://urbanus:urbanus@postgres:5432/urbanus
      - OPENTOPOGRAPHY_API_KEY=${OPENTOPOGRAPHY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: urbanus
      POSTGRES_PASSWORD: urbanus
      POSTGRES_DB: urbanus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
